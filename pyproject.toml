[project]
name = "causal-conv1d-mojo"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "torch==2.9.0",
    "causal-conv1d==1.6.1",
    # 'max' here only ships the Mojo compiler + runtime libs that our
    # native .so links against (libKGENCompilerRTShared, libAsyncRTMojoBindings,
    # etc.). We do not use the MAX framework / CustomOpLibrary at runtime.
    "max",
    # build-time deps for causal-conv1d (we disable build isolation so it
    # compiles against our pinned torch 2.9.0 instead of pulling latest)
    "setuptools>=70",
    "wheel",
    "packaging",
    "ninja",
]

[build-system]
requires = ["setuptools>=70"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64"]

[tool.pixi.dependencies]
cuda-nvcc = "12.8.*"
pytest = "*"

[tool.pixi.system-requirements]
libc = "2.34"

[tool.pixi.pypi-options]
no-build-isolation = ["causal-conv1d"]

[tool.pixi.pypi-dependencies]
causal-conv1d-mojo = { path = ".", editable = true }

[tool.pixi.tasks]
build-native = "mojo build src/causal_conv1d_mojo/_native/causal_conv1d_native.mojo --emit shared-lib -o src/causal_conv1d_mojo/_native/causal_conv1d_native.so"
test = { cmd = "pytest", depends-on = ["build-native"] }
bench = { cmd = "python benchmarks/bench_causal_conv1d.py", depends-on = ["build-native"] }
bench-gpu = { cmd = "python benchmarks/bench_gpu_kernel_time.py", depends-on = ["build-native"] }
bench-python = { cmd = "python benchmarks/bench_python_overhead.py", depends-on = ["build-native"] }
