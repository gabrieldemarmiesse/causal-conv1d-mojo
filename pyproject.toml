[project]
name = "causal-conv1d-mojo"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
# Pinned to 3.13: torch 2.8.0 ships prebuilt cp313 wheels but not cp314.
# Bump once those land.
requires-python = ">=3.13,<3.14"
dependencies = [
    "torch==2.8.0",
    "mojo-compiler==1.0.0b1",
    "mojo-compiler-mojo-libs==1.0.0b1",
    "setuptools>=70",
    "wheel",
    "packaging",
    "numpy>=2.4.4",
    #"causal-conv1d @ https://github.com/Dao-AILab/causal-conv1d/releases/download/v1.6.2.post1/causal_conv1d-1.6.2.post1+cu12torch2.8cxx11abiTRUE-cp313-cp313-linux_x86_64.whl", 

]

# Upstream `causal-conv1d` (Tri Dao's CUDA op) is a C++ extension whose
# build-from-source takes several minutes; we don't need it for correctness
# (tests use the pure-pytorch reference in `tests/_reference.py`). It's only
# pulled in when benchmarking us against the upstream kernel:
#   pip install causal-conv1d==1.6.1
[project.optional-dependencies]
bench = [
    #"causal-conv1d @ https://github.com/Dao-AILab/causal-conv1d/releases/download/v1.6.2.post1/causal_conv1d-1.6.2.post1+cu12torch2.8cxx11abiTRUE-cp313-cp313-linux_x86_64.whl", 
    "ninja"
]


[tool.pixi.environments]
default = {features = [], solve-group = "default"}
bench = {features = ["bench"], solve-group = "default"}

[build-system]
requires = ["setuptools>=70"]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"causal_conv1d_mojo" = ["**/*.mojo"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
# E741: "ambiguous variable name `l`" — `l` is conventional for seqlen
# in ML code (matches upstream causal_conv1d). Same for `B`, `D`, etc.
ignore = ["E741"]

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64"]

[tool.pixi.dependencies]
cuda-nvcc = "12.8.*"
# System libstdc++ is too old for the Mojo compiler (needs GLIBCXX_3.4.30+).
libstdcxx-ng = ">=13"

[tool.pixi.system-requirements]
libc = "2.34"

# The Mojo compiler binary links against GLIBCXX_3.4.30+, which the host's
# system libstdc++ (in /lib64) may not provide. We installed libstdcxx-ng to
# get a newer libstdc++ into the conda env, but the loader still finds the
# system one first; prepend the env's lib dir to LD_LIBRARY_PATH so mojo
# resolves to the conda-provided libstdc++.so.6 instead.
#
# MAX 26.3+ links against CUDA-13's internal libnvptxcompiler and refuses
# to load on NVIDIA driver <580 (CUDA <13). Pointing MAX at the env's
# CUDA-12.8 ptxas via this env var disables the driver-version guard and
# routes final PTX -> cubin through the external compiler instead.
# See: https://modul.ar/gpu-requirements.
[tool.pixi.activation.env]
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH"
MODULAR_NVPTX_COMPILER_PATH = "$CONDA_PREFIX/bin/ptxas"

[tool.pixi.pypi-dependencies]
causal-conv1d-mojo = { path = ".", editable = true }
matplotlib = "*"
pytest = "*"
ruff = "*"
pre-commit = "*"

[tool.pixi.tasks]
# The Mojo source is compiled lazily on first `import causal_conv1d_mojo` --
# `mojo.importer` registers an import hook that runs `mojo build` and caches
# the .so under src/causal_conv1d_mojo/_native/__mojocache__/. So none of the
# tasks below need to pre-build anything.
test = "pytest"
bench-gpu = "python benchmarks/bench_gpu_kernel_time.py"
bench-vs-pytorch = "python benchmarks/bench_vs_pytorch.py"
bench-backward = "python benchmarks/bench_backward.py"
plot-bench = "python benchmarks/plot_bench.py"
# Run all pre-commit hooks on every tracked file (CI use). Use
# `pixi run pre-commit-install` once locally to wire `.git/hooks/pre-commit`.
lint = "pre-commit run --all-files"
pre-commit-install = "pre-commit install"
