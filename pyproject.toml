[project]
name = "causal-conv1d-mojo"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
# Pinned to 3.13: torch 2.8.0 ships prebuilt cp313 wheels but not cp314.
# Bump once those land.
requires-python = ">=3.13,<3.14"
dependencies = [
    "torch==2.8.0",
    "mojo-compiler==1.0.0b1",
    "mojo-compiler-mojo-libs==1.0.0b1",
    "numpy>=2.4.4",
]

[build-system]
requires = ["setuptools>=70"]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = [
    "matplotlib>=3.10.9",
    "pytest>=9.0.3",
    "ruff",
    "pre-commit",
    # Linux x86_64 / NVIDIA-only dev deps: ptxas (for MAX 26.3+ on
    # NVIDIA driver <580) and the upstream Tri Dao causal-conv1d wheel
    # (used by the bench env's reference impl). The published wheel is
    # linux_x86_64 only, and ptxas only matters on NVIDIA, so we gate
    # both on `sys_platform == 'linux' and platform_machine == 'x86_64'`.
    # The Mojo GPU code paths on this branch work on Apple Metal via
    # torch.mps — see `src/causal_conv1d_mojo/_mps.py`.
    "nvidia-cuda-nvcc-cu12==12.8.*; sys_platform == 'linux' and platform_machine == 'x86_64'",
    "causal-conv1d @ https://github.com/Dao-AILab/causal-conv1d/releases/download/v1.6.2.post1/causal_conv1d-1.6.2.post1+cu12torch2.8cxx11abiTRUE-cp313-cp313-linux_x86_64.whl ; sys_platform == 'linux' and platform_machine == 'x86_64'",
    "wheel",
    "packaging",
    "setuptools>=70",
]

[tool.uv]
# `uv sync` installs `dev` by default; users who want bench wheels run
# `uv sync --extra bench`.
default-groups = ["dev"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"causal_conv1d_mojo" = ["**/*.mojo"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
# E741: "ambiguous variable name `l`" — `l` is conventional for seqlen
# in ML code (matches upstream causal_conv1d). Same for `B`, `D`, etc.
ignore = ["E741"]
