[project]
name = "causal-conv1d-mojo"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
# Pinned to 3.13 because flash-attn 2.8.x ships prebuilt cp313 wheels
# but no cp314 ones — and we'd rather not build flash-attn from source
# (~5 min nvcc compile). Once Dao-AILab ships cp314 wheels we can bump.
requires-python = ">=3.13,<3.14"
dependencies = [
    # Pinned to 2.8.0 to match flash-attn 2.8.3's cp313+torch2.8 wheel
    # below. causal-conv1d is built without isolation against this same
    # torch (see [tool.pixi.pypi-options] below).
    "torch==2.8.0",
    "causal-conv1d==1.6.1",
    # 'max' here only ships the Mojo compiler + runtime libs that our
    # native .so links against (libKGENCompilerRTShared, libAsyncRTMojoBindings,
    # etc.). We do not use the MAX framework / CustomOpLibrary at runtime.
    "max",
    # build-time deps for causal-conv1d (we disable build isolation so it
    # compiles against our pinned torch instead of pulling latest)
    "setuptools>=70",
    "wheel",
    "packaging",
    "ninja",
    # Upstream flash-attn 2.8.3 — used by tests/test_flash_attn.py to
    # validate flash_attn_mojo against. Pinned to a prebuilt wheel from
    # the GitHub release so `pixi install` doesn't run nvcc for 5 min.
    "flash-attn @ https://github.com/Dao-AILab/flash-attention/releases/download/v2.8.3/flash_attn-2.8.3+cu12torch2.8cxx11abiTRUE-cp313-cp313-linux_x86_64.whl",
]

[build-system]
requires = ["setuptools>=70"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
# E741: "ambiguous variable name `l`" — `l` is conventional for seqlen
# in ML code (matches upstream causal_conv1d). Same for `B`, `D`, etc.
ignore = ["E741"]

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64"]

[tool.pixi.dependencies]
cuda-nvcc = "12.8.*"
pytest = "*"
matplotlib = "*"
ruff = "*"
pre-commit = "*"

[tool.pixi.system-requirements]
libc = "2.34"

[tool.pixi.pypi-options]
no-build-isolation = ["causal-conv1d"]

[tool.pixi.pypi-dependencies]
causal-conv1d-mojo = { path = ".", editable = true }

[tool.pixi.tasks]
# The Mojo source is compiled lazily on first `import causal_conv1d_mojo` --
# `mojo.importer` registers an import hook that runs `mojo build` and caches
# the .so under src/causal_conv1d_mojo/_native/__mojocache__/. So none of the
# tasks below need to pre-build anything.
test = "pytest"
bench-gpu = "python benchmarks/bench_gpu_kernel_time.py"
bench-vs-pytorch = "python benchmarks/bench_vs_pytorch.py"
bench-backward = "python benchmarks/bench_backward.py"
plot-bench = "python benchmarks/plot_bench.py"
# Run all pre-commit hooks on every tracked file (CI use). Use
# `pixi run pre-commit-install` once locally to wire `.git/hooks/pre-commit`.
lint = "pre-commit run --all-files"
pre-commit-install = "pre-commit install"
