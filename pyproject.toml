[project]
name = "causal-conv1d-mojo"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
# Pinned to 3.13: torch 2.8.0 ships prebuilt cp313 wheels but not cp314.
# Bump once those land.
requires-python = ">=3.13,<3.14"
dependencies = [
    "torch",
    "mojo-compiler==1.0.0b1",
    "mojo-compiler-mojo-libs==1.0.0b1",
    "numpy>=2.4.4",
    "pytorch-triton-rocm",
]

[build-system]
requires = ["setuptools>=70"]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = [
    "matplotlib>=3.10.9",
    "pytest>=9.0.3",
    "ruff",
    "pre-commit",
    # Provides an external `ptxas` so MAX 26.3+ (linked against CUDA-13's
    # libnvptxcompiler) can run on NVIDIA driver <580. The package itself
    # exposes a real `nvidia.cuda_nvcc` Python module; we read its
    # `__file__` at import time to set MODULAR_NVPTX_COMPILER_PATH. See
    # src/causal_conv1d_mojo/__init__.py.
    "nvidia-cuda-nvcc-cu12==12.8.*",
    "causal-conv1d",
    "wheel",
    "packaging",
    "setuptools>=70",
]



# ---------------------------------------------------------

[[tool.uv.index]]
name = "pytorch-rocm"
url = "https://download.pytorch.org/whl/rocm6.4"
explicit = true

[tool.uv.sources]
torch = [
  { index = "pytorch-rocm", marker = "sys_platform == 'linux'" },
]
# ROCm support relies on both Triton packages, which should also be installed from
# the PyTorch index (and included in `project.dependencies`).
pytorch-triton-rocm = [
  { index = "pytorch-rocm", marker = "sys_platform == 'linux'" },
]
triton-rocm = [
  { index = "pytorch-rocm", marker = "sys_platform == 'linux'" },
]

# ---------------------------------------------------------

[tool.uv]
# `uv sync` installs `dev` by default; users who want bench wheels run
# `uv sync --extra bench`.
default-groups = ["dev"]
# causal-conv1d's setup.py imports torch at build time to detect CUDA vs
# HIP, so it needs the env's torch — not a fresh PEP-517 build env.
no-build-isolation-package = ["causal-conv1d"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"causal_conv1d_mojo" = ["**/*.mojo"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
# E741: "ambiguous variable name `l`" — `l` is conventional for seqlen
# in ML code (matches upstream causal_conv1d). Same for `B`, `D`, etc.
ignore = ["E741"]
